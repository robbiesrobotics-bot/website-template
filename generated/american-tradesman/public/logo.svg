<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <linearGradient id="markGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#02235B"/>
      <stop offset="1" stop-color="#034EA2"/>
    </linearGradient>
  </defs>

  <!-- ATG monogram mark -->
  <rect x="0" y="10" width="56" height="56" rx="4" fill="url(#markGrad)"/>
  <text x="28" y="50"
        font-family="Arial Black, Arial, sans-serif" font-size="24" font-weight="900"
        fill="#FFFFFF" text-anchor="middle" letter-spacing="1">ATG</text>

  <!-- Company name -->
  <text x="70" y="30"
        font-family="Arial, sans-serif" font-size="13" font-weight="400"
        fill="#02235B" letter-spacing="6">AMERICAN TRADESMAN</text>

  <!-- Tagline -->
  <text x="70" y="58"
        font-family="Arial, sans-serif" font-size="18" font-weight="700"
        fill="#2D2D2D" letter-spacing="1">GROUP</text>

  <!-- Red accent dot -->
  <circle cx="310" cy="57" r="5" fill="#D1000B"/>
</svg>
